# PDF Q&A RAG Chatbot — Docker Compose
# Author: Rohit Thakur

version: '3.8'

services:
  chatbot:
    build: .
    container_name: pdf-qa-chatbot
    ports:
      - "8501:8501"
    environment:
      - HF_API_TOKEN=${HF_API_TOKEN}
    volumes:
      - ./data:/app/data
      - ./mlflow_runs:/app/mlflow_runs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
